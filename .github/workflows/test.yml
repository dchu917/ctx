name: Test

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Compile Python modules
        run: python3 -m py_compile contextfun/cli.py contextfun/web.py scripts/ctx_cmd.py

      - name: Check frontend script syntax
        run: node --check contextfun/web_assets/app.js

      - name: Run release smoke tests
        run: python3 -m unittest discover -s tests -v
